<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gym Tracker</title>
    <style>
        :root {
            --bg-body: #cbd5e1; /* Sfondo grigio-azzurro vivace */
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #475569;
            --accent-color: #10b981; /* Verde Smeraldo vivace */
            --accent-light: #ecfdf5;
            --mint-green: #d1fae5;
            --mint-green-text: #065f46;
            --border-light: #e2e8f0;
            --nav-bg-medium: #475569; /* Grigio-azzurro soft per navigazione */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            padding: 15px;
            padding-top: 25px; /* Spazio superiore regolato dopo la rimozione del titolo */
            padding-bottom: 180px; /* Spazio inferiore per la bolla del timer */
        }

        /* PANNELLO DI NAVIGAZIONE SOFT */
        .navigation-panel {
            background-color: var(--nav-bg-medium);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 25px;
            box-shadow: 0 4px 12px rgba(71, 85, 105, 0.2);
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .week-select-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            padding: 6px 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .week-label-minimal {
            font-size: 14px;
            font-weight: 800;
            color: #f1f5f9;
            text-transform: uppercase;
        }

        select.week-dropdown {
            flex: 1;
            background-color: transparent;
            color: white;
            border: none;
            font-size: 16px;
            font-weight: 800;
            outline: none;
            cursor: pointer;
            text-align: right;
            direction: rtl;
            -webkit-appearance: none;
        }

        .day-tabs {
            display: flex;
            gap: 6px;
            width: 100%;
        }

        .day-btn {
            flex: 1;
            background-color: rgba(255, 255, 255, 0.08);
            color: #cbd5e1;
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px 5px;
            font-size: 13px;
            font-weight: 800;
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s ease;
        }

        .day-btn.active {
            background-color: white;
            color: var(--accent-color);
            transform: scale(1.02);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        /* STRUTTURA CON DOPPIA LINEA LATERALE SIMMETRICA SENZA PALLINI */
        .workout-container {
            position: relative;
            padding: 0 20px; /* Spazio uniforme a destra e sinistra */
        }

        /* Linea di scorrimento Sinistra sfumata e sottile */
        .workout-container::before {
            content: '';
            position: absolute;
            top: 10px;
            bottom: 10px;
            left: 8px;
            width: 2px;
            background: linear-gradient(to bottom, transparent, var(--accent-color), var(--nav-bg-medium), transparent);
            border-radius: 10px;
            opacity: 0.5;
        }

        /* Linea di scorrimento Destra sfumata e sottile */
        .workout-container::after {
            content: '';
            position: absolute;
            top: 10px;
            bottom: 10px;
            right: 8px;
            width: 2px;
            background: linear-gradient(to bottom, transparent, var(--accent-color), var(--nav-bg-medium), transparent);
            border-radius: 10px;
            opacity: 0.5;
        }

        /* ESERCIZI (Bianco pulito ad alto contrasto) */
        .day-content {
            display: none;
        }

        .day-content.active {
            display: block;
        }

        .exercise-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-light);
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 16px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.03);
            transition: all 0.3s ease;
            position: relative;
        }

        /* Effetto completato grigiastro e sbiadito */
        .exercise-card.completed {
            opacity: 0.45;
            background-color: #f1f5f9;
        }

        .exercise-card.completed .ex-name {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .exercise-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 14px;
            gap: 10px;
        }

        .exercise-title-area {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .ex-name {
            font-size: 18px;
            font-weight: 900;
            color: var(--text-main);
        }

        .ex-target {
            font-size: 11px;
            font-weight: 800;
            color: var(--accent-color);
            background: var(--accent-light);
            padding: 4px 8px;
            border-radius: 8px;
            align-self: flex-start;
        }

        /* Checkbox per la spunta */
        .done-container {
            display: flex;
            align-items: center;
        }

        .done-checkbox {
            appearance: none;
            -webkit-appearance: none;
            width: 26px;
            height: 26px;
            border: 2px solid var(--border-light);
            border-radius: 8px;
            outline: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            background-color: #f8fafc;
        }

        .done-checkbox:checked {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
        }

        .done-checkbox:checked::after {
            content: "✓";
            color: white;
            font-size: 16px;
            font-weight: 900;
        }

        /* Righe inserimento carichi */
        .input-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f8fafc;
            border-radius: 14px;
            padding: 10px 14px;
            border: 1px solid var(--border-light);
        }

        .row-title {
            font-size: 12px;
            font-weight: 800;
            color: var(--text-muted);
        }

        .input-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-math {
            background-color: var(--mint-green);
            color: var(--mint-green-text);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            font-size: 22px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 4px rgba(6, 95, 70, 0.05);
        }

        .btn-math:active {
            background-color: #a7f3d0;
            transform: scale(0.95);
        }

        .weight-field {
            width: 80px;
            height: 44px;
            background-color: var(--card-bg);
            color: var(--text-main);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            text-align: center;
            font-size: 18px;
            font-weight: 800;
            outline: none;
        }

        .weight-field:focus {
            border-color: var(--accent-color);
        }

        /* WIDGET TIMER: Piccolo, Carino e Staccato dal fondo (Bubble Design) */
        .fixed-timer {
            position: fixed;
            bottom: 20px; /* Sospeso da terra */
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 320px; /* Più compatto e carino */
            background-color: rgba(255, 255, 255, 0.96); /* Trasparenza minimal */
            backdrop-filter: blur(8px);
            border: 1px solid var(--border-light);
            border-top: 3px solid var(--accent-color);
            border-radius: 24px;
            padding: 14px;
            box-shadow: 0 8px 25px rgba(15, 23, 42, 0.12);
            z-index: 9999;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            touch-action: none; /* Disabilita lo scroll nativo per consentire la gesture di swipe */
        }

        /* Quando viene aggiunta questa classe, il timer scompare del tutto */
        .fixed-timer.hidden {
            display: none !important;
        }

        /* Indicatore visivo dello swipe (lineetta orizzontale in tinta) */
        .timer-swipe-indicator {
            width: 36px;
            height: 4px;
            background-color: #cbd5e1;
            border-radius: 10px;
            margin-bottom: 2px;
        }

        .timer-clock {
            font-size: 28px; /* Più minimale */
            font-weight: 900;
            color: var(--text-main);
            font-family: monospace;
            letter-spacing: -0.5px;
        }

        .timer-controls {
            display: flex;
            gap: 5px;
            width: 100%;
        }

        .btn-control {
            flex: 1;
            padding: 8px 4px;
            border: 1px solid var(--border-light);
            border-radius: 10px;
            font-size: 12px;
            font-weight: 800;
            cursor: pointer;
            text-align: center;
            background-color: #f1f5f9;
            color: var(--text-main);
            transition: all 0.15s ease;
        }

        .btn-control.start {
            background: linear-gradient(135deg, var(--accent-color), #059669);
            color: #ffffff;
            border-color: var(--accent-color);
            flex: 1.2;
        }

        .btn-control.pause {
            background-color: #fef3c7;
            color: #d97706;
            border-color: #fde68a;
            flex: 1.2;
        }

        .btn-control.reset {
            background-color: #e2e8f0;
            color: #475569;
        }

        .btn-control.adjust {
            max-width: 44px;
            background-color: #f1f5f9;
            color: var(--text-main);
        }

        .btn-control:active {
            transform: scale(0.95);
        }

        /* TASTO DI RECUPERO SOSPESO IN TINTA */
        .show-timer-trigger {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #34d399, var(--accent-color));
            color: white;
            text-align: center;
            padding: 10px 22px;
            font-weight: 800;
            font-size: 12px;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
            z-index: 9998;
            display: none; /* Nascosto di default */
            transition: all 0.2s ease;
        }

        .show-timer-trigger:active {
            transform: translateX(-50%) scale(0.95);
        }
    </style>
</head>
<body>

    <!-- NAVIGAZIONE SETTIMANA / GIORNO -->
    <div class="navigation-panel">
        <div class="week-select-row">
            <span class="week-label-minimal">📅 Settimana</span>
            <select class="week-dropdown" id="week-selector">
                <option value="w1">Settimana 1</option>
                <option value="w2">Settimana 2</option>
                <option value="w3">Settimana 3</option>
                <option value="w4">Settimana 4</option>
                <option value="w5">Settimana 5</option>
                <option value="w6">Settimana 6</option>
                <option value="w7">Settimana 7</option>
                <option value="w8">Settimana 8</option>
                <option value="w9">Settimana 9</option>
                <option value="w10">Settimana 10</option>
                <option value="w11">Settimana 11</option>
                <option value="w12">Settimana 12</option>
            </select>
        </div>
        <div class="day-tabs">
            <button class="day-btn active" data-day="lun">LUN</button>
            <button class="day-btn" data-day="mar">MAR</button>
            <button class="day-btn" data-day="gio">GIO</button>
            <button class="day-btn" data-day="ven">VEN</button>
        </div>
    </div>

    <!-- STRUTTURA SCHEDE CON BARRE DI SCORRIMENTO SIMMETRICHE -->
    <div class="workout-container">
        <div id="panel-lun" class="day-content active"></div>
        <div id="panel-mar" class="day-content"></div>
        <div id="panel-gio" class="day-content"></div>
        <div id="panel-ven" class="day-content"></div>
    </div>

    <!-- TASTO SOSPESO DI RECUPERO TIMER -->
    <div class="show-timer-trigger" id="recover-timer-btn" onclick="showTimer()">
        ⏱️ Mostra Timer
    </div>

    <!-- TIMER BOLLA COMPATTO CON SWIPE-DOWN -->
    <div class="fixed-timer" id="timer-widget">
        <!-- Indicatore dello swipe in alto -->
        <div class="timer-swipe-indicator"></div>
        
        <div class="timer-clock" id="clock-display">02:00</div>
        
        <div class="timer-controls">
            <button class="btn-control adjust" onclick="adjustTime(-10)">-10</button>
            <button class="btn-control start" id="ctrl-start">START</button>
            <button class="btn-control reset" id="ctrl-reset">RESET</button>
            <button class="btn-control adjust" onclick="adjustTime(10)">+10</button>
        </div>
    </div>

    <script>
        const workoutDatabase = {
            lun: [
                { id: "lun_panca", name: "Panca piana", target: "4x4-6" },
                { id: "lun_croci", name: "Croci cavi", target: "4x8" },
                { id: "lun_lento", name: "Lento Smith Machine", target: "4x6" },
                { id: "lun_alzate", name: "Alzate laterali", target: "4x10" },
                { id: "lun_african", name: "African curl", target: "4x4-6 (8-12)" },
                { id: "lun_bayesian", name: "Bayesian curl", target: "4x8" },
                { id: "lun_avambraccio", name: "Curl avambraccio", target: "3x15" }
            ],
            mar: [
                { id: "mar_lat", name: "Lat machine", target: "4x4-6" },
                { id: "mar_pulley", name: "Pulley", target: "4x8" },
                { id: "mar_rumeno", name: "Stacco rumeno", target: "3x8" },
                { id: "mar_ext", name: "Leg extension", target: "3x10" },
                { id: "mar_post", name: "Deltoidi posteriori", target: "3x10" },
                { id: "mar_pushdown", name: "Pushdown barra", target: "4x6" },
                { id: "mar_french", name: "French Press cavi in piedi", target: "4x8" }
            ],
            gio: [
                { id: "gio_squat", name: "Squat bilanciere", target: "4x6" },
                { id: "gio_press", name: "Leg Press", target: "4x8" },
                { id: "gio_thrust", name: "Hip Thrust", target: "3x10" },
                { id: "gio_curl", name: "Leg curl", target: "4x10-12" },
                { id: "gio_calf", name: "Calf rise seduto", target: "3x12" },
                { id: "gio_pulldown", name: "Pull down cavi core", target: "3x15" },
                { id: "gio_raise", name: "Leg raise parallele", target: "3x8" }
            ],
            ven: [
                { id: "ven_inclinata", name: "Panca inclinata DB", target: "3x6" },
                { id: "ven_peck", name: "Peck deck", target: "3x10" },
                { id: "ven_lowrow", name: "Low Row singola", target: "3x6" },
                { id: "ven_latsingola", name: "Lat singola concentrata", target: "3x8" },
                { id: "ven_alzatecavi", name: "Alzate laterali ai cavi", target: "3x8" },
                { id: "ven_curlcavi", name: "Curl ai cavi", target: "3x10" },
                { id: "ven_pushdown", name: "Pushdown singolo", target: "3x8" }
            ]
        };

        let activeWeek = "w1";
        let activeDay = "lun";

        // Genera la scheda nel DOM
        function renderExercises() {
            for (const [day, exercises] of Object.entries(workoutDatabase)) {
                const container = document.getElementById(`panel-${day}`);
                let html = '';

                exercises.forEach(ex => {
                    const storageKey = `${ex.id}_${activeWeek}`;
                    const inputId = `val_${storageKey}`;
                    const doneKey = `done_${storageKey}`;
                    
                    html += `
                        <div class="exercise-card" id="card_${storageKey}">
                            <div class="exercise-header">
                                <div class="exercise-title-area">
                                    <span class="ex-name">${ex.name}</span>
                                    <span class="ex-target">${ex.target}</span>
                                </div>
                                <div class="done-container">
                                    <input type="checkbox" 
                                           class="done-checkbox" 
                                           id="check_${storageKey}" 
                                           data-key="${doneKey}" 
                                           data-card="card_${storageKey}" 
                                           onchange="toggleComplete(this)">
                                </div>
                            </div>
                            <div class="input-row">
                                <span class="row-title">🏋️ KG</span>
                                <div class="input-actions">
                                    <button class="btn-math" onclick="mathWeight('${inputId}', -2.5)">-</button>
                                    <input type="number" 
                                           pattern="[0-9]*" 
                                           inputmode="decimal" 
                                           id="${inputId}" 
                                           class="weight-field" 
                                           data-key="${storageKey}" 
                                           placeholder="--" 
                                           oninput="handleInput(this)">
                                    <button class="btn-math" onclick="mathWeight('${inputId}', 2.5)">+</button>
                                </div>
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html;
            }
            loadSavedWeights();
        }

// Funzione Segna Completato / Sbiadisci scheda
        window.toggleComplete = function(checkbox) {
            const cardId = checkbox.getAttribute('data-card');
            const card = document.getElementById(cardId);
            const key = checkbox.getAttribute('data-key');
            
            if (checkbox.checked) {
                card.classList.add('completed');
                localStorage.setItem(key, 'true');
            } else {
                card.classList.remove('completed');
                localStorage.removeItem(key);
            }
        };

        // Funzione calcoli rapidi carichi (+ / -)
        window.mathWeight = function(inputId, step) {
            const input = document.getElementById(inputId);
            if (!input) return;
            let currentVal = parseFloat(input.value) || 0;
            currentVal = Math.max(0, currentVal + step);
            input.value = currentVal;
            localStorage.setItem(input.getAttribute('data-key'), currentVal);
        };

        // Salvataggio su scrittura manuale
        window.handleInput = function(element) {
            const key = element.getAttribute('data-key');
            const val = element.value;
            if (val !== "") {
                localStorage.setItem(key, val);
            } else {
                localStorage.removeItem(key);
            }
        };

        // Caricamento carichi e spunte salvate
        function loadSavedWeights() {
            document.querySelectorAll('.weight-field').forEach(input => {
                const key = input.getAttribute('data-key');
                const saved = localStorage.getItem(key);
                if (saved) {
                    input.value = saved;
                }
            });

            document.querySelectorAll('.done-checkbox').forEach(checkbox => {
                const key = checkbox.getAttribute('data-key');
                const saved = localStorage.getItem(key);
                if (saved === 'true') {
                    checkbox.checked = true;
                    const cardId = checkbox.getAttribute('data-card');
                    const card = document.getElementById(cardId);
                    if (card) card.classList.add('completed');
                }
            });
        }

        // Cambio Giorno
        document.querySelectorAll('.day-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.day-content').forEach(p => p.classList.remove('active'));

                this.classList.add('active');
                activeDay = this.getAttribute('data-day');
                document.getElementById(`panel-${activeDay}`).classList.add('active');
            });
        });

        // Cambio Settimana
        document.getElementById('week-selector').addEventListener('change', function() {
            activeWeek = this.value;
            renderExercises();
        });

        // ==========================================
        // CONTROLLO DEL TIMER (SCOMPARSA TOTALE)
        // ==========================================
        window.hideTimer = function() {
            document.getElementById('timer-widget').classList.add('hidden');
            document.getElementById('recover-timer-btn').style.display = 'block';
        };

        window.showTimer = function() {
            document.getElementById('timer-widget').classList.remove('hidden');
            document.getElementById('recover-timer-btn').style.display = 'none';
        };

        // GESTURE DI SWIPE-DOWN SUL WIDGET DEL TIMER
        let startY = 0;
        const timerWidget = document.getElementById('timer-widget');

        timerWidget.addEventListener('touchstart', function(e) {
            startY = e.touches[0].clientY;
        }, { passive: true });

        timerWidget.addEventListener('touchmove', function(e) {
            let currentY = e.touches[0].clientY;
            let diffY = currentY - startY;
            // Se trasciniamo sensibilmente verso il basso
            if (diffY > 60) {
                hideTimer();
            }
        }, { passive: true });

        // Gestione visibilità automatica con la tastiera
        document.addEventListener('focusin', (e) => {
            if (e.target.tagName === 'INPUT') {
                document.getElementById('timer-widget').style.setProperty('display', 'none', 'important');
                document.getElementById('recover-timer-btn').style.setProperty('display', 'none', 'important');
            }
        });

        document.addEventListener('focusout', (e) => {
            if (e.target.tagName === 'INPUT') {
                document.getElementById('timer-widget').style.removeProperty('display');
                if (document.getElementById('timer-widget').classList.contains('hidden')) {
                    document.getElementById('recover-timer-btn').style.display = 'block';
                }
            }
        });

        // ==========================================
        // CRONOMETRO / TIMER (Default 2m = 120s)
        // ==========================================
        let timerId = null;
        let defaultTime = 120;
        let timeRemaining = 120;
        let timerRunning = false;

        const clockDisplay = document.getElementById('clock-display');
        const startBtn = document.getElementById('ctrl-start');

        function drawClock() {
            const mins = Math.floor(timeRemaining / 60);
            const secs = timeRemaining % 60;
            clockDisplay.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        window.adjustTime = function(val) {
            timeRemaining = Math.max(0, timeRemaining + val);
            drawClock();
        };

        startBtn.addEventListener('click', function() {
            if (timerRunning) {
                clearInterval(timerId);
                timerRunning = false;
                this.innerText = "START";
                this.className = "btn-control start";
            } else {
                if (timeRemaining <= 0) return;
                timerRunning = true;
                this.innerText = "PAUSE";
                this.className = "btn-control pause";

                timerId = setInterval(() => {
                    timeRemaining--;
                    drawClock();

                    if (timeRemaining <= 0) {
                        clearInterval(timerId);
                        timerRunning = false;
                        startBtn.innerText = "START";
                        startBtn.className = "btn-control start";
                        triggerBeep();
                        alert("Tempo scaduto! Sotto con la prossima serie!");
                    }
                }, 1000);
            }
        });

        document.getElementById('ctrl-reset').addEventListener('click', function() {
            clearInterval(timerId);
            timerRunning = false;
            timeRemaining = defaultTime;
            drawClock();
            startBtn.innerText = "START";
            startBtn.className = "btn-control start";
        });

        function triggerBeep() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                
                osc.connect(gain);
                gain.connect(ctx.destination);
                
                osc.type = "sine";
                osc.frequency.setValueAtTime(880, ctx.currentTime);
                gain.gain.setValueAtTime(0.5, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 1.0);
                
                osc.start();
                osc.stop(ctx.currentTime + 1.0);
            } catch (e) {
                console.log("Audio bloccato dal browser");
            }
        }

        // Avvio dell'app
        window.addEventListener('DOMContentLoaded', () => {
            renderExercises();
            drawClock();
        });
    </script>
</body>
</html>
